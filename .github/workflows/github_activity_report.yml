name: GitHub Activity Report

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:   # allow manual runs from the Actions UI
  workflow_run:
    workflows: ["*"]
    types:
      - completed

jobs:
  generate_report:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run GitHub Activity Report
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
          GH_REPO: ${{ github.repository }}
          GH_LOOKBACK_DAYS: "30"   # only report on runs from the last 30 days
        run: python github_activity_report.py

      - name: Upload Excel report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: github_activity_audit_report
          path: github_activity_audit_report.xlsx
          if-no-files-found: error
