name: GitHub Activity Report

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:        # allow manual runs from the Actions UI
  # NOTE: workflow_run: ["*"] was removed intentionally.
  # It caused a self-triggering cascade: this workflow completes → fires itself
  # again → two runs overlap → non-fast-forward push rejection.
  # Use workflow_dispatch or a scheduled trigger if you need to run after
  # other workflows complete.

jobs:
  generate_report:
    runs-on: ubuntu-latest

    permissions:
      contents: write        # needed to commit the Excel report back to the repo
      actions: read          # needed to read workflow run details
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history required for rebase during push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run GitHub Activity Report
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
          GH_REPO: ${{ github.repository }}
          GH_LOOKBACK_DAYS: "30"
        run: python github_activity_report.py

      - name: Upload Excel report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: github_activity_report
          path: github_activity_report.xlsx
          if-no-files-found: error

      - name: Commit and push report to repository
        # Skip on pull_request — PRs from forks cannot push to the base branch.
        if: github.event_name != 'pull_request'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add github_activity_report.xlsx

          if git diff --staged --quiet; then
            echo "Report unchanged — nothing to commit."
            exit 0
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "chore: update activity report [${TIMESTAMP}] (run ${{ github.run_id }})"

          # Pull remote changes with rebase before pushing to handle any
          # commits that landed on the branch while this job was running.
          # --no-edit avoids interactive prompts; --strategy-option=ours
          # ensures our generated report always wins on conflict.
          BRANCH="${{ github.ref_name }}"
          git pull --rebase --strategy-option=ours origin "${BRANCH}"

          git push origin "${BRANCH}"
