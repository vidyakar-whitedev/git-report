name: GitHub Workflow Report

on:
  push:
    branches:
      - main

env:
  # Force Node.js 24 for all JS actions to avoid future deprecation issues
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run GitHub Workflow Report
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python github_workflow_report.py

      - name: Upload Excel report
        uses: actions/upload-artifact@v4
        with:
          name: github_workflow_report
          path: github_workflow_report.xlsx
